name: Build TaoMind

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      create_ipa:
        description: 'Build production IPA (requires certs)'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build & Test ───────────────────────────────────────
  build:
    name: Build for iOS Simulator
    runs-on: macos-14  # Apple Silicon (M1/M2) runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (latest)
        run: |
          echo "Available Xcode versions:"
          ls -d /Applications/Xcode*.app 2>/dev/null || echo "  (none found)"
          XCODE_APP=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_APP" ]; then
            sudo xcode-select -s "$XCODE_APP/Contents/Developer"
            echo "Selected: $XCODE_APP"
          fi
          xcodebuild -version

      - name: Install xcodegen
        run: |
          brew install xcodegen 2>/dev/null || brew upgrade xcodegen 2>/dev/null
          xcodegen --version

      - name: Clean stale project (avoid Xcode format mismatch)
        run: rm -rf TaoMind.xcodeproj

      - name: Generate Xcode Project
        run: xcodegen generate
        working-directory: .

      - name: Build for Simulator
        run: |
          xcodebuild build \
            -project TaoMind.xcodeproj \
            -scheme TaoMind \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.5' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}
        working-directory: .

      - name: Upload Build Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ~/Library/Logs/DiagnosticReports/
          retention-days: 7

  # ─── Archive & IPA (manual trigger) ────────────────────
  archive:
    name: Archive for App Store
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_ipa == 'true'
    runs-on: macos-14
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install xcodegen
        run: |
          brew install xcodegen 2>/dev/null || brew upgrade xcodegen 2>/dev/null
          xcodegen --version

      - name: Clean stale project (avoid Xcode format mismatch)
        run: rm -rf TaoMind.xcodeproj

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Archive
        run: |
          xcodebuild archive \
            -project TaoMind.xcodeproj \
            -scheme TaoMind \
            -configuration Release \
            -archivePath TaoMind.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="${{ secrets.DEVELOPMENT_TEAM }}"
        working-directory: .

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath TaoMind.xcarchive \
            -exportPath ./TaoMind.ipa \
            -exportOptionsPlist Resources/ExportOptions.plist \
            -allowProvisioningUpdates
        working-directory: .

      - name: Upload IPA (artifact backup)
        uses: actions/upload-artifact@v4
        with:
          name: TaoMind-IPA
          path: TaoMind-iOS/TaoMind.ipa/TaoMind.ipa
          retention-days: 30

      - name: Upload to App Store Connect (TestFlight)
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          if [ -z "$ASC_API_KEY_ID" ]; then
            echo "ASC_API_KEY_ID not set — skipping TestFlight upload. IPA available as artifact."
            exit 0
          fi
          echo "$ASC_API_KEY" > /tmp/asc_key.p8
          xcrun altool --upload-app \
            -f "TaoMind-iOS/TaoMind.ipa/TaoMind.ipa" \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID" \
            --type ios \
            --verbose 2>&1
        working-directory: .
