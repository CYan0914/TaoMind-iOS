name: Build TaoMind

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      create_ipa:
        description: 'Build production IPA (requires certs)'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build & Test ───────────────────────────────────────
  build:
    name: Build for iOS Simulator
    runs-on: macos-14  # Apple Silicon (M1/M2) runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls /Applications/Xcode*.app/Contents/Developer 2>/dev/null | head -3
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer 2>/dev/null || true
          xcodebuild -version

      - name: Install xcodegen
        run: |
          brew install xcodegen 2>/dev/null || brew upgrade xcodegen 2>/dev/null
          xcodegen --version

      - name: Generate Xcode Project
        run: xcodegen generate
        working-directory: .

      - name: Build for Simulator
        run: |
          xcodebuild build \
            -project TaoMind.xcodeproj \
            -scheme TaoMind \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.5' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}
        working-directory: .

      - name: Upload Build Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ~/Library/Logs/DiagnosticReports/
          retention-days: 7

  # ─── Archive & IPA (manual trigger) ────────────────────
  archive:
    name: Archive for App Store
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_ipa == 'true'
    runs-on: macos-14
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install xcodegen
        run: |
          brew install xcodegen 2>/dev/null || brew upgrade xcodegen 2>/dev/null
          xcodegen --version

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Archive
        run: |
          xcodebuild archive \
            -project TaoMind.xcodeproj \
            -scheme TaoMind \
            -configuration Release \
            -archivePath TaoMind.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ secrets.CODE_SIGN_IDENTITY }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE }}" \
            DEVELOPMENT_TEAM="${{ secrets.DEVELOPMENT_TEAM }}"
        working-directory: .

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath TaoMind.xcarchive \
            -exportPath ./TaoMind.ipa \
            -exportOptionsPlist Resources/ExportOptions.plist
        working-directory: .

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TaoMind-IPA
          path: TaoMind-iOS/TaoMind.ipa/TaoMind.ipa
          retention-days: 30
