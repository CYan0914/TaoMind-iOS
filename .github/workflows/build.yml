name: Build TaoMind

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      create_ipa:
        description: 'Build production IPA (requires certs)'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build & Test ───────────────────────────────────────
  build:
    name: Build for iOS Simulator
    runs-on: macos-14  # Apple Silicon (M1/M2) runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          echo "Available:"
          ls -d /Applications/Xcode*.app 2>/dev/null
          # Try Xcode 16 first (can read newer formats)
          for ver in "Xcode_16.2" "Xcode_16.1" "Xcode_16.0" "Xcode_15.4"; do
            if [ -d "/Applications/${ver}.app" ]; then
              sudo xcode-select -s "/Applications/${ver}.app/Contents/Developer"
              echo "Selected: ${ver}"
              break
            fi
          done
          xcodebuild -version

      - name: Install xcodegen
        run: |
          brew install xcodegen 2>/dev/null || brew upgrade xcodegen 2>/dev/null
          xcodegen --version

      - name: Clean stale project (avoid Xcode format mismatch)
        run: |
          echo "Before cleanup:"
          ls -la TaoMind.xcodeproj/ 2>/dev/null || echo "  (no xcodeproj)"
          rm -rf TaoMind.xcodeproj
          echo "After cleanup: done"

      - name: Generate Xcode Project
        run: xcodegen generate
        working-directory: .

      - name: Build for Simulator
        run: |
          xcodebuild build \
            -project TaoMind.xcodeproj \
            -scheme TaoMind \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.5' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}
        working-directory: .

      - name: Upload Build Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ~/Library/Logs/DiagnosticReports/
          retention-days: 7

  # ─── Archive & IPA (manual trigger) ────────────────────
  archive:
    name: Archive for App Store
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_ipa == 'true'
    runs-on: macos-14
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          echo "Available:"
          ls -d /Applications/Xcode*.app 2>/dev/null
          for ver in "Xcode_16.2" "Xcode_16.1" "Xcode_16.0" "Xcode_15.4"; do
            if [ -d "/Applications/${ver}.app" ]; then
              sudo xcode-select -s "/Applications/${ver}.app/Contents/Developer"
              echo "Selected: ${ver}"
              break
            fi
          done
          xcodebuild -version

      - name: Install xcodegen
        run: |
          brew install xcodegen 2>/dev/null || brew upgrade xcodegen 2>/dev/null
          xcodegen --version

      - name: Clean stale project (avoid Xcode format mismatch)
        run: |
          echo "Before cleanup:"
          ls -la TaoMind.xcodeproj/ 2>/dev/null || echo "  (no xcodeproj)"
          rm -rf TaoMind.xcodeproj
          echo "After cleanup: done"

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Archive
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY }}
        run: |
          echo "$APPSTORE_API_KEY" > /tmp/AuthKey_${APPSTORE_KEY_ID}.p8
          xcodebuild \
            -authenticationKeyPath /tmp/AuthKey_${APPSTORE_KEY_ID}.p8 \
            -authenticationKeyID "$APPSTORE_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID" \
            -allowProvisioningUpdates \
            archive \
            -project TaoMind.xcodeproj \
            -scheme TaoMind \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath TaoMind.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="${{ secrets.DEVELOPMENT_TEAM }}"
        working-directory: .

      - name: Export IPA
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY }}
        run: |
          echo "$APPSTORE_API_KEY" > /tmp/AuthKey_${APPSTORE_KEY_ID}.p8
          xcodebuild \
            -authenticationKeyPath /tmp/AuthKey_${APPSTORE_KEY_ID}.p8 \
            -authenticationKeyID "$APPSTORE_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID" \
            -allowProvisioningUpdates \
            -exportArchive \
            -archivePath TaoMind.xcarchive \
            -exportPath ./TaoMind.ipa \
            -exportOptionsPlist Resources/ExportOptions.plist
        working-directory: .

      - name: Upload IPA (artifact backup)
        uses: actions/upload-artifact@v4
        with:
          name: TaoMind-IPA
          path: TaoMind.ipa/TaoMind.ipa
          retention-days: 30

      - name: Upload to App Store Connect (TestFlight)
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY }}
        run: |
          if [ -z "$APPSTORE_KEY_ID" ]; then
            echo "APPSTORE_KEY_ID not set — skipping TestFlight upload. IPA available as artifact."
            exit 0
          fi
          mkdir -p ~/private_keys
          echo "$APPSTORE_API_KEY" > ~/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8
          xcrun altool --upload-app \
            -f "TaoMind.ipa/TaoMind.ipa" \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID" \
            --type ios \
            --verbose 2>&1
        working-directory: .
