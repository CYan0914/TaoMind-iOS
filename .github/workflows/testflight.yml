name: Upload to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive
        run: |
          xcodebuild -project TaoMind.xcodeproj \
            -scheme TaoMind \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            archive \
            -archivePath ./build/TaoMind.xcarchive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ./build/TaoMind.xcarchive \
            -exportOptionsPlist ./Resources/ExportOptions.plist \
            -exportPath ./build \
            -allowProvisioningUpdates

      - name: Upload to TestFlight
        run: |
          echo "${{ secrets.APPSTORE_API_KEY }}" > /tmp/AuthKey.p8
          xcrun altool --upload-app \
            --type ios \
            --file ./build/TaoMind.ipa \
            --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"
